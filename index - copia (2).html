<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jardín Animado PRO</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    overflow: hidden;
    font-family: sans-serif;
}

/* TEXTO */
h1 {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.5rem;
    text-shadow: 0 0 15px rgba(255,255,255,0.8);
    animation: fadeText 3s ease-in-out infinite alternate;
}

@keyframes fadeText {
    from { opacity: 0.6; }
    to { opacity: 1; }
}

/* CONTENEDOR */
.garden {
    position: relative;
    width: 500px;
    height: 600px;
    bottom: 50px;
}

/* TALLO */
@keyframes swayStem {
    0%,100% { transform: translateX(-50%) rotate(-1deg); }
    50% { transform: translateX(-50%) rotate(2deg); }
}

.stem {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 8px;
    height: 350px;
    background: linear-gradient(to top, #0a330a, #4caf50);
    border-radius: 6px;
    transform-origin: bottom center;
    animation: swayStem 6s infinite cubic-bezier(0.42,0,0.58,1);
    box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
}

/* HOJAS */
@keyframes swayLeaf {
    0%,100% { transform: rotate(-10deg); }
    50% { transform: rotate(-18deg); }
}

.leaf {
    position: absolute;
    width: 45px;
    height: 25px;
    background: #2e7d32;
    border-radius: 0 100% 0 100%;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    animation: swayLeaf 6s infinite ease-in-out;
}

.leaf-left { left: -40px; top: 120px; }
.leaf-right { right: -40px; top: 180px; transform: rotate(180deg); }

/* FLOR */
@keyframes rotateFlower {
    0% { transform: translateX(-50%) rotate(-2deg); }
    50% { transform: translateX(-50%) rotate(4deg); }
    100% { transform: translateX(-50%) rotate(-2deg); }
}

.flower-cluster {
    position: absolute;
    top: 200px;
    left: 50%;
    animation: rotateFlower 6s infinite ease-in-out;
}

/* PÉTALOS */
.petal {
    position: absolute;
    width: 55px;
    height: 45px;
    background: radial-gradient(circle, #fff176, #fbc02d);
    border-radius: 50%;
    transform-origin: center;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
}

.p1 { transform: rotate(0deg) translateY(-28px); }
.p2 { transform: rotate(72deg) translateY(-28px); }
.p3 { transform: rotate(144deg) translateY(-28px); }
.p4 { transform: rotate(216deg) translateY(-28px); }
.p5 { transform: rotate(288deg) translateY(-28px); }

.center {
    position: absolute;
    width: 35px;
    height: 35px;
    background: #6b4e00;
    border-radius: 50%;
    top: 3px;
    left: 10px;
    z-index: 2;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

/* CORAZONES */
@keyframes floatHeart {
    0% { transform: rotate(45deg) translateY(0); opacity: 1; }
    100% { transform: rotate(45deg) translateY(-120px); opacity: 0; }
}

.heart {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff4d4d;
    transform: rotate(45deg);
    animation: floatHeart 4s infinite linear;
    box-shadow: 0 0 15px rgba(255, 77, 77, 0.8);
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff4d4d;
    border-radius: 50%;
}

.heart::before { left: -9px; }
.heart::after { top: -9px; }

.h1 { left: 120px; top: 200px; animation-delay: 0s; }
.h2 { left: 300px; top: 220px; animation-delay: 1.5s; }
.h3 { left: 200px; top: 180px; animation-delay: 0.8s; }

</style>
</head>

<body>

<h1>Hola ileanita esta flor es para usted por bonita
    pronto tendra las reales por bonita 
    💙</h1>

<div class="garden">

    <div class="heart h1"></div>
    <div class="heart h2"></div>
    <div class="heart h3"></div>

    <div class="stem">
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
    </div>

    <div class="flower-cluster">
        <div class="center"></div>
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
    </div>

</div>

</body>
</html>
